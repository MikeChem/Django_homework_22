{% extends "catalog/base.html" %}
{% block content %}
    <h1>Удалить блоговую запись?</h1>
    <p>Вы уверены, что хотите удалить запись "{{ object.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'blog:blogpost_list' %}">Отмена</a>
    </form>
{% endblock %}
